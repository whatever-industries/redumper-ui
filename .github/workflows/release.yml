name: Release

on:
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: "Pinned redumper upstream tag"
        required: false
        type: string
      release_suffix:
        description: "Optional suffix for rebuilding the same redumper version, such as b"
        required: false
        type: string
      create_updater_artifacts:
        description: "Create signed Tauri updater artifacts"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      app_version: ${{ steps.version.outputs.app_version }}
      release_version: ${{ steps.version.outputs.release_version }}
      upstream_tag: ${{ steps.version.outputs.upstream_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          app_version=$(jq -r .version package.json)
          upstream_tag=$(jq -r .tag .redumper/upstream.json)
          release_number="${upstream_tag#b}"
          release_suffix="${{ inputs.release_suffix }}"
          release_version="${release_number}${release_suffix}"
          echo "app_version=$app_version" >> "$GITHUB_OUTPUT"
          echo "release_version=$release_version" >> "$GITHUB_OUTPUT"
          echo "upstream_tag=$upstream_tag" >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const appVersion = '${{ steps.version.outputs.app_version }}'
            const releaseVersion = '${{ steps.version.outputs.release_version }}'
            const upstreamTag = '${{ steps.version.outputs.upstream_tag }}'
            const tagName = `v${releaseVersion}`
            const releaseName = `Redumper UI ${releaseVersion}`
            const manifest = require('./.redumper/upstream.json')
            const targetTags = Object.entries(manifest.assets || {})
              .map(([target, asset]) => [target, asset.tag || manifest.tag])
            const pinnedTargets = targetTags
              .filter(([, tag]) => tag !== upstreamTag)
              .map(([target, tag]) => `${target}: ${tag}`)
            const bundledLine = pinnedTargets.length
              ? `Bundled redumper: ${upstreamTag}; pinned targets: ${pinnedTargets.join(', ')}`
              : `Bundled redumper: ${upstreamTag}`
            const body = `${bundledLine}\nInternal app version: ${appVersion}\n\nThis release includes redumper GPL-3.0 notices. See NOTICE.md in the repository.`

            const owner = context.repo.owner
            const repo = context.repo.repo

            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: tagName
              })
              const updated = await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: data.id,
                name: releaseName,
                body,
                prerelease: false
              })
              return String(updated.data.id)
            } catch (error) {
              if (error.status !== 404) {
                throw error
              }
            }

            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: releaseName,
              body,
              draft: true,
              prerelease: false
            })
            return String(data.id)

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: windows-x64
            platform: windows-latest
            artifact_suffix: Windows_x64
            redumper_target: windows-x64
            tauri_args: --target x86_64-pc-windows-msvc --bundles nsis
            rust_targets: x86_64-pc-windows-msvc
          - label: windows-arm64
            platform: windows-latest
            artifact_suffix: Windows_ARM
            redumper_target: windows-arm64
            tauri_args: --target aarch64-pc-windows-msvc --bundles nsis
            rust_targets: aarch64-pc-windows-msvc
          - label: macos-arm64
            platform: macos-latest
            artifact_suffix: macOS_ARM
            redumper_target: macos-arm64
            tauri_args: --target aarch64-apple-darwin --bundles app,dmg
            rust_targets: aarch64-apple-darwin
          - label: macos-x64
            platform: macos-15-intel
            artifact_suffix: macOS_x64
            redumper_target: macos-x64
            tauri_args: --target x86_64-apple-darwin --bundles app,dmg
            rust_targets: x86_64-apple-darwin
          - label: linux-x64
            platform: ubuntu-24.04
            artifact_suffix: Linux_x64
            redumper_target: linux-x64
            tauri_args: --bundles appimage
            rust_targets: ""
          - label: linux-arm64
            platform: ubuntu-24.04-arm
            artifact_suffix: Linux_ARM
            redumper_target: linux-arm64
            tauri_args: --bundles appimage
            rust_targets: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: startsWith(matrix.platform, 'ubuntu-')
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo -E timeout 300 apt-get -o Acquire::Retries=3 update
          sudo -E timeout 600 apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust
        if: matrix.rust_targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        if: matrix.rust_targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare redumper resource
        env:
          REDUMPER_TARGET: ${{ matrix.redumper_target }}
        run: npm run prepare-redumper

      - name: Smoke test bundled redumper
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            exe="src-tauri/resources/redumper/bin/redumper.exe"
          else
            exe="src-tauri/resources/redumper/bin/redumper"
          fi
          if [[ ! -f "$exe" ]]; then
            echo "Prepared redumper binary is missing: $exe" >&2
            exit 1
          fi
          if [[ "${{ matrix.redumper_target }}" == "windows-arm64" ]]; then
            echo "Prepared Windows ARM64 redumper binary at $exe"
            echo "Skipping execution because GitHub's Windows runner is x64."
            exit 0
          fi
          "$exe" --version
          "$exe" --help

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.tauri_args }} ${{ (((github.event_name == 'workflow_dispatch' && inputs.create_updater_artifacts == true) || vars.CREATE_UPDATER_ARTIFACTS == 'true') && secrets.TAURI_SIGNING_PRIVATE_KEY != '') && '--config src-tauri/tauri.updater.conf.json' || '' }}

      - name: Upload macOS release artifact
        if: runner.os == 'macOS'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${{ needs.create-release.outputs.release_version }}"
          asset="Redumper UI_${{ matrix.artifact_suffix }}_v${version}.zip"
          app_dir=$(find "src-tauri/target/${{ matrix.rust_targets }}/release/bundle/macos" -maxdepth 1 -name "Redumper UI.app" -type d | head -n 1)
          if [[ -z "$app_dir" ]]; then
            echo "Could not find macOS app bundle" >&2
            exit 1
          fi
          codesign --force --deep --sign - "$app_dir"
          codesign --verify --deep --strict --verbose=2 "$app_dir"
          ditto -c -k --keepParent "$app_dir" "$asset"
          gh release upload "v${version}" "$asset" --clobber

      - name: Upload Windows release artifact
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ needs.create-release.outputs.release_version }}"
          $asset = "Redumper UI_${{ matrix.artifact_suffix }}_v$version.exe"
          $nsisDir = "src-tauri/target/${{ matrix.rust_targets }}/release/bundle/nsis"
          $installer = Get-ChildItem -Path $nsisDir -Filter "*.exe" -Recurse | Select-Object -First 1
          if (-not $installer) {
            Write-Error "Could not find Windows NSIS installer"
            exit 1
          }
          Copy-Item $installer.FullName $asset
          gh release upload "v$version" $asset --clobber

      - name: Upload Linux release artifact
        if: runner.os == 'Linux'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version="${{ needs.create-release.outputs.release_version }}"
          asset="Redumper UI_${{ matrix.artifact_suffix }}_v${version}.AppImage"
          appimage=$(find src-tauri/target -path "*/bundle/appimage/*" -name "*.AppImage" -type f | head -n 1)
          if [[ -z "$appimage" ]]; then
            echo "Could not find Linux AppImage" >&2
            exit 1
          fi
          cp "$appimage" "$asset"
          gh release upload "v${version}" "$asset" --clobber

  publish-release:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number('${{ needs.create-release.outputs.release_id }}'),
              draft: false,
              prerelease: false
            })

      - name: Keep current and two previous releases
        uses: actions/github-script@v7
        with:
          script: |
            const keepCount = 3
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            })
            const published = releases
              .filter((release) => !release.draft)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))

            for (const release of published.slice(keepCount)) {
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.id
              })

              if (release.tag_name) {
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${release.tag_name}`
                }).catch((error) => {
                  if (error.status !== 422 && error.status !== 404) {
                    throw error
                  }
                })
              }
            }
